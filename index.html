<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="영단어">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#c084fc">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%23ff4d8d'/><text x='90' y='115' font-size='100' text-anchor='middle' fill='white' font-family='Arial Black'>📚</text></svg>">
<title>✨ 영단어 챌린지 - DAY 8~40 ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Black+Han+Sans&family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  :root {
    --pink: #ff4d8d;
    --pink-light: #ffb3d1;
    --purple: #a855f7;
    --blue: #3b82f6;
    --cyan: #06d6f0;
    --yellow: #fde047;
    --green: #22c55e;
    --red: #ef4444;
    --dark: #1e1b4b;
  }
  
  html, body {
    height: 100%;
    width: 100%;
    overflow-x: hidden;
    font-family: 'Jua', 'Fredoka', sans-serif;
    background: linear-gradient(135deg, #ff9ec7 0%, #c084fc 35%, #818cf8 70%, #06d6f0 100%);
    background-size: 400% 400%;
    animation: bgShift 15s ease infinite;
    color: white;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    overscroll-behavior: none;
  }
  
  body {
    /* iPhone 노치/홈인디케이터 영역 활용 */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    min-height: 100vh;
    min-height: 100dvh;
    /* 게임 중 스크롤 방지 (메뉴 화면은 필요시 스크롤 허용) */
    overflow: hidden;
    position: fixed;
    width: 100%;
    height: 100%;
    height: 100dvh;
  }
  
  /* 메뉴/랭킹 화면은 스크롤 가능하게 (선택) */
  body.allow-scroll {
    overflow-y: auto;
    position: relative;
  }
  
  @keyframes bgShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); }
  }
  
  #app {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    min-height: 100dvh;
    padding: 8px 12px 12px;
    max-width: 600px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
  }
  
  /* 게임 화면(quiz, typing)에서는 콘텐츠가 화면에 딱 맞도록 */
  .screen.active {
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .screen:not(.active) { display: none; }
  
  /* 모바일 (430px 이하 - 아이폰 15 Pro Max 포함) 화면 대응 */
  @media (max-width: 430px) {
    #app { padding: 10px 12px 16px; }
    
    .title-card { padding: 15px 10px; margin-top: 0; }
    .title-card h1 { font-size: 2.4rem; }
    .title-card .subtitle { font-size: 1rem; }
    .title-card .day-badge { font-size: 0.95rem; padding: 6px 16px; }
    
    .btn { padding: 16px; margin: 10px 0; font-size: 1.2rem; }
    .btn .emoji { font-size: 1.6rem; margin-bottom: 2px; }
    
    .menu-info { padding: 10px; font-size: 0.85rem; margin: 10px 0; }
    
    /* DAY 그리드 - 4열로 더 컴팩트 */
    .day-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .day-card { padding: 10px 6px; }
    .day-card .day-num { font-size: 1.3rem; }
    .day-card .day-title { font-size: 0.7rem; height: 2.2em; }
    .day-card .best-score { font-size: 0.65rem; }
    
    .game-header { padding: 9px 10px; gap: 4px; }
    .stat .label { font-size: 0.65rem; }
    .stat .value { font-size: 1.15rem; }
    
    .question-card { padding: 22px 16px; margin-bottom: 14px; border-width: 3px; }
    .question-card .label { font-size: 0.85rem; }
    .question-word { font-size: 2rem; }
    .pronunciation { font-size: 0.95rem; margin-top: 5px; }
    
    .choice { padding: 12px; font-size: 1rem; gap: 10px; }
    .choice .num { width: 28px; height: 28px; font-size: 0.9rem; }
    
    .typing-input { padding: 14px; font-size: 1.2rem; }
    .hint-btn { padding: 9px 14px; font-size: 0.85rem; }
    .hint-display { font-size: 0.95rem; padding: 8px; }
    
    .feedback { font-size: 1.05rem; }
    .feedback .correct-answer { font-size: 0.95rem; padding: 8px 14px; }
    
    .next-btn { padding: 14px; font-size: 1.1rem; }
    .exit-btn { padding: 6px 12px; font-size: 0.85rem; }
    
    .selected-day-info { padding: 10px; }
    .selected-day-info .num { font-size: 1.5rem; }
    .selected-day-info .title { font-size: 0.9rem; }
    
    .stats-summary { padding: 10px; font-size: 0.85rem; }
    .stats-summary .big { font-size: 1.3rem; }
    
    /* 결과 화면 */
    .result-card { padding: 22px 16px; }
    .result-card .trophy { font-size: 3.8rem; }
    .result-card h2 { font-size: 1.5rem; }
    .result-stat .item { padding: 10px 6px; min-width: 75px; }
    .result-stat .item .num { font-size: 1.4rem; }
    .result-stat .item .lbl { font-size: 0.75rem; }
    .name-input { padding: 12px; font-size: 1.05rem; }
    
    /* 콤보 표시 - 작게 */
    .combo { font-size: 3.5rem; }
    
    /* 랭킹 */
    .rank-list { padding: 14px; }
    .rank-item { padding: 8px; gap: 10px; }
    .rank-medal { font-size: 1.4rem; width: 32px; }
    .rank-name { font-size: 0.95rem; }
    .rank-score { font-size: 1.05rem; }
    
    /* === 게임 화면 노스크롤 최적화 === */
    /* 퀴즈 화면을 화면에 딱 맞추기 */
    #screen-quiz, #screen-typing {
      height: calc(100vh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 20px);
      height: calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 20px);
      max-height: calc(100vh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 20px);
      max-height: calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 20px);
    }
    
    /* 게임 헤더 더 컴팩트하게 */
    .game-header { padding: 7px 8px; margin-bottom: 8px; }
    .stat .label { font-size: 0.6rem; }
    .stat .value { font-size: 1rem; }
    .progress-bar { height: 6px; margin-bottom: 8px; }
    
    /* 질문 카드 압축 */
    .question-card { padding: 14px 12px; margin-bottom: 8px; border-radius: 18px; border-width: 3px; }
    .question-card .label { font-size: 0.75rem; margin-bottom: 4px; }
    .question-word { font-size: 1.7rem; }
    .pronunciation { font-size: 0.8rem; margin-top: 3px; }
    
    /* 4지선다 보기 압축 */
    .choices { gap: 6px; flex: 1; }
    .choice { padding: 9px 10px; font-size: 0.92rem; gap: 8px; border-radius: 14px; box-shadow: 0 3px 0 rgba(0,0,0,0.15); }
    .choice .num { width: 24px; height: 24px; font-size: 0.8rem; }
    
    /* 타이핑 입력창 */
    .typing-input { padding: 10px; font-size: 1.1rem; margin-bottom: 6px; border-width: 3px; border-radius: 14px; }
    .hint-btn { padding: 7px 12px; font-size: 0.8rem; }
    .hint-display { font-size: 0.85rem; padding: 5px 8px; min-height: 12px; letter-spacing: 3px; margin-top: 6px; }
    
    /* 피드백 영역 */
    .feedback { font-size: 0.95rem; margin: 6px 0; min-height: 22px; }
    .feedback .correct-answer { font-size: 0.88rem; padding: 6px 10px; border-radius: 10px; }
    .feedback .correct-answer .pron { font-size: 0.75rem; }
    .next-btn { padding: 11px; font-size: 1rem; border-radius: 14px; box-shadow: 0 4px 0 rgba(0,0,0,0.2); margin-top: 4px; }
    
    /* 그만하기 버튼 */
    .exit-btn { padding: 5px 10px; font-size: 0.78rem; margin-bottom: 6px; }
    
    /* 콤보 표시 작게 */
    .combo { font-size: 3rem; }
    
    /* DAY 그리드 화면도 한 페이지에 더 보이게 */
    .day-grid { gap: 6px; }
    .day-card { padding: 8px 4px; border-radius: 14px; box-shadow: 0 3px 0 rgba(0,0,0,0.15); }
    .day-card .day-num { font-size: 1.15rem; }
    .day-card .day-title { font-size: 0.65rem; height: 2.0em; margin-top: 3px; }
    .day-card .best-score { font-size: 0.6rem; }
    
    .stats-summary { padding: 8px; font-size: 0.78rem; margin-bottom: 10px; }
    .stats-summary .big { font-size: 1.15rem; }
    
    .selected-day-info { padding: 8px; margin-bottom: 10px; border-radius: 14px; }
    .selected-day-info .num { font-size: 1.3rem; }
    .selected-day-info .title { font-size: 0.85rem; }
  }
  
  /* 가로모드 (landscape) 대응 */
  @media (max-height: 500px) and (orientation: landscape) {
    .title-card { padding: 10px; margin-top: 0; }
    .title-card h1 { font-size: 1.8rem; }
    .title-card .subtitle { font-size: 0.85rem; margin-top: 4px; }
    .btn { padding: 12px; margin: 8px 0; font-size: 1.05rem; }
    .question-card { padding: 16px; margin-bottom: 10px; }
    .question-word { font-size: 1.6rem; }
  }
  
  .screen { display: none; animation: fadeIn 0.5s ease; }
  .screen.active { display: block; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  /* === 메인 메뉴 === */
  .title-card {
    text-align: center;
    padding: 30px 20px;
    margin-top: 10px;
  }
  .title-card h1 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(2.5rem, 8vw, 3.5rem);
    line-height: 1;
    background: linear-gradient(180deg, #fff 0%, #fde047 50%, #ff4d8d 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: 0 0 30px rgba(255,255,255,0.5);
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
    animation: titleBounce 2s ease-in-out infinite;
  }
  @keyframes titleBounce {
    0%, 100% { transform: translateY(0) rotate(-1deg); }
    50% { transform: translateY(-8px) rotate(1deg); }
  }
  .title-card .subtitle {
    font-size: 1.2rem;
    margin-top: 10px;
    color: white;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .title-card .day-badge {
    display: inline-block;
    background: linear-gradient(135deg, #fde047, #ff4d8d);
    color: white;
    padding: 8px 20px;
    border-radius: 30px;
    font-size: 1.1rem;
    margin-top: 12px;
    box-shadow: 0 4px 15px rgba(255,77,141,0.4);
    transform: rotate(-3deg);
  }
  
  .btn {
    display: block;
    width: 100%;
    padding: 22px;
    margin: 16px 0;
    border: none;
    border-radius: 25px;
    font-family: 'Jua', sans-serif;
    font-size: 1.4rem;
    color: white;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.2s;
    box-shadow: 0 8px 0 rgba(0,0,0,0.2), 0 12px 25px rgba(0,0,0,0.2);
    text-shadow: 0 2px 4px rgba(0,0,0,0.2);
  }
  .btn:active {
    transform: translateY(4px);
    box-shadow: 0 4px 0 rgba(0,0,0,0.2), 0 6px 15px rgba(0,0,0,0.2);
  }
  
  .btn-quiz { background: linear-gradient(135deg, #ff4d8d, #c026d3); }
  .btn-typing { background: linear-gradient(135deg, #06d6f0, #3b82f6); }
  .btn-rank { background: linear-gradient(135deg, #fde047, #f97316); }
  .btn-back { background: linear-gradient(135deg, #64748b, #475569); padding: 14px; font-size: 1.1rem; }
  
  .btn .emoji {
    font-size: 2rem;
    display: block;
    margin-bottom: 5px;
  }
  
  /* === DAY 선택 그리드 === */
  .day-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin: 20px 0;
  }
  .day-card {
    background: rgba(255,255,255,0.95);
    color: var(--dark);
    border: none;
    border-radius: 18px;
    padding: 14px 8px;
    cursor: pointer;
    box-shadow: 0 5px 0 rgba(0,0,0,0.15);
    transition: all 0.15s;
    position: relative;
    text-align: center;
    font-family: 'Jua', sans-serif;
  }
  .day-card:active {
    transform: translateY(3px);
    box-shadow: 0 2px 0 rgba(0,0,0,0.15);
  }
  .day-card .day-num {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1.6rem;
    background: linear-gradient(135deg, #ff4d8d, #c026d3);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }
  .day-card .day-title {
    font-size: 0.78rem;
    color: #555;
    margin-top: 6px;
    line-height: 1.2;
    word-break: keep-all;
    height: 2.4em;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .day-card.cleared {
    background: linear-gradient(135deg, #fef3c7, #fde047);
    border: 2px solid #f59e0b;
  }
  .day-card.cleared::before {
    content: "⭐";
    position: absolute;
    top: -8px;
    right: -8px;
    font-size: 1.5rem;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
  }
  .day-card .best-score {
    font-size: 0.7rem;
    color: var(--pink);
    font-weight: bold;
    margin-top: 3px;
  }
  
  .mode-select {
    text-align: center;
    padding: 10px;
  }
  .mode-select h2 {
    font-size: 1.6rem;
    margin: 10px 0 15px;
    text-shadow: 0 3px 10px rgba(0,0,0,0.3);
  }
  .selected-day-info {
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 12px;
    margin-bottom: 15px;
    border: 2px solid rgba(255,255,255,0.4);
  }
  .selected-day-info .num {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1.8rem;
    color: #fde047;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
  }
  .selected-day-info .title {
    font-size: 1rem;
    margin-top: 3px;
  }
  
  .game-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 12px 15px;
    margin-bottom: 15px;
    border: 2px solid rgba(255,255,255,0.3);
  }
  .stat {
    text-align: center;
  }
  .stat .label {
    font-size: 0.75rem;
    opacity: 0.9;
  }
  .stat .value {
    font-size: 1.4rem;
    font-weight: bold;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
  }
  .progress-bar {
    height: 10px;
    background: rgba(255,255,255,0.3);
    border-radius: 5px;
    overflow: hidden;
    margin-bottom: 15px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #fde047, #ff4d8d);
    transition: width 0.4s ease;
    box-shadow: 0 0 10px rgba(255,255,255,0.5);
  }
  
  .question-card {
    background: white;
    border-radius: 30px;
    padding: 30px 20px;
    margin-bottom: 18px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    text-align: center;
    color: var(--dark);
    position: relative;
    border: 4px solid #fde047;
    animation: cardPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes cardPop {
    0% { transform: scale(0.8) rotate(-3deg); opacity: 0; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }
  .question-card .label {
    font-size: 0.9rem;
    color: var(--pink);
    margin-bottom: 8px;
  }
  .question-word {
    font-family: 'Fredoka', sans-serif;
    font-size: clamp(2rem, 8vw, 2.8rem);
    font-weight: 700;
    background: linear-gradient(135deg, #ff4d8d, #c026d3);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    word-break: break-word;
  }
  .question-word.korean {
    font-family: 'Jua', sans-serif;
    background: linear-gradient(135deg, #3b82f6, #06d6f0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  
  .pronunciation {
    font-family: 'Fredoka', 'Times New Roman', serif;
    font-size: 1.1rem;
    color: #888;
    margin-top: 8px;
    font-style: italic;
    font-weight: 400;
    letter-spacing: 1px;
  }
  .pronunciation::before { content: "/ "; opacity: 0.6; }
  .pronunciation::after { content: " /"; opacity: 0.6; }
  
  /* 4지선다 정답 후 표시되는 발음 */
  .correct-answer .pron {
    font-size: 0.85rem;
    color: #999;
    font-style: italic;
    margin-top: 4px;
    display: block;
  }
  
  .choices {
    display: grid;
    gap: 10px;
  }
  .choice {
    background: white;
    color: var(--dark);
    border: 3px solid transparent;
    border-radius: 18px;
    padding: 15px;
    font-family: 'Jua', sans-serif;
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 5px 0 rgba(0,0,0,0.15);
  }
  .choice:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.15); }
  .choice .num {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ff4d8d, #c026d3);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    flex-shrink: 0;
    font-size: 0.95rem;
  }
  .choice.correct {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: white;
    border-color: #fde047;
    animation: correctShake 0.5s;
  }
  .choice.correct .num { background: white; color: #22c55e; }
  .choice.wrong {
    background: linear-gradient(135deg, #ef4444, #dc2626);
    color: white;
    animation: wrongShake 0.5s;
  }
  .choice.wrong .num { background: white; color: #ef4444; }
  @keyframes correctShake {
    0%, 100% { transform: scale(1); }
    25% { transform: scale(1.05) rotate(-2deg); }
    75% { transform: scale(1.05) rotate(2deg); }
  }
  @keyframes wrongShake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-8px); }
    40%, 80% { transform: translateX(8px); }
  }
  
  .typing-input {
    width: 100%;
    padding: 18px;
    border: 4px solid white;
    border-radius: 20px;
    background: rgba(255,255,255,0.95);
    font-family: 'Fredoka', sans-serif;
    font-size: 1.4rem;
    color: var(--dark);
    text-align: center;
    margin-bottom: 12px;
    outline: none;
    transition: all 0.2s;
  }
  .typing-input:focus {
    border-color: #fde047;
    box-shadow: 0 0 30px rgba(253,224,71,0.6);
  }
  .typing-input.correct {
    background: #22c55e;
    color: white;
    animation: correctShake 0.5s;
  }
  .typing-input.wrong {
    background: #ef4444;
    color: white;
    animation: wrongShake 0.5s;
  }
  .hint-btn {
    background: linear-gradient(135deg, #fde047, #f97316);
    color: white;
    border: none;
    padding: 11px 20px;
    border-radius: 14px;
    font-family: 'Jua', sans-serif;
    font-size: 0.95rem;

let audioCtx;
let audioReady = false;
function getCtx(){
  if(!audioCtx) {
    try {
      audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    } catch(e) { return null; }
  }
  return audioCtx;
}
function unlockAudio() {
  const ctx = getCtx();
  if(!ctx) return;
  if(ctx.state === 'suspended') {
    ctx.resume().then(()=>{
      audioReady = true;
      // 무음 비프 한 번 재생해서 iOS 오디오 잠금 해제
      try {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        g.gain.value = 0;
        o.connect(g); g.connect(ctx.destination);
        o.start(); o.stop(ctx.currentTime + 0.001);
      } catch(e) {}
    }).catch(()=>{});
  } else {
    audioReady = true;
  }
}
function beep(freq, dur=0.1, type='sine', vol=0.2) {
  try {
    const ctx = getCtx();
    if(!ctx) return;
    if(ctx.state === 'suspended') ctx.resume();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime+dur);
  } catch(e) {}
}
function sndCorrect() {
  beep(523, 0.1, 'sine', 0.2);
  setTimeout(()=>beep(659, 0.1, 'sine', 0.2), 80);
  setTimeout(()=>beep(784, 0.15, 'sine', 0.2), 160);
}
function sndWrong() {
  beep(200, 0.15, 'sawtooth', 0.15);
  setTimeout(()=>beep(150, 0.2, 'sawtooth', 0.15), 100);
}
function sndCombo() {
  beep(880, 0.08, 'square', 0.15);
  setTimeout(()=>beep(1100, 0.08, 'square', 0.15), 60);
  setTimeout(()=>beep(1320, 0.12, 'square', 0.15), 120);
}
function sndClick() { beep(600, 0.05, 'sine', 0.1); }
function sndFinish() {
  const notes = [523, 659, 784, 1047];
  notes.forEach((n,i)=>setTimeout(()=>beep(n,0.2,'sine',0.2), i*120));
}

// ============ 파티클 ============
function spawnParticles(x, y, emojis=['⭐','✨','💖','🌟']) {
  for(let i=0;i<10;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    p.style.left = x+'px';
    p.style.top = y+'px';
    const ang = Math.random()*Math.PI*2;
    const dist = Math.random()*150+80;
    p.style.setProperty('--dx', Math.cos(ang)*dist+'px');
    p.style.setProperty('--dy', Math.sin(ang)*dist+'px');
    p.style.setProperty('--rot', Math.random()*720-360+'deg');
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), 1200);
  }
}

function showCombo(text) {
  const el = document.getElementById('combo-display');
  el.textContent = text;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}

// ============ 화면 전환 ============
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  sndClick();
  window.scrollTo(0,0);
  
  // 메뉴/DAY선택/결과/랭킹은 스크롤 허용, 게임 화면은 고정
  const scrollableScreens = ['menu','day','mode','result','ranking'];
  if(scrollableScreens.includes(name)) {
    document.body.classList.add('allow-scroll');
  } else {
    document.body.classList.remove('allow-scroll');
  }
}

function confirmExit() {
  sndClick();
  if(currentIdx >= questions.length) {
    showScreen('menu');
    return;
  }
  if(confirm('정말 그만할까요?\n현재 점수는 저장되지 않아요 😢')) {
    showScreen('menu');
  }
}

// ============ 게임 상태 ============
let gameMode = '';
let direction = '';
let selectedDay = null;
let questions = [];
let currentIdx = 0;
let score = 0;
let combo = 0;
let maxCombo = 0;
let correctCount = 0;
let answered = false;
let hintUsed = false;
let retryUsed = false;

// ============ DAY 선택 ============
function goToDaySelect(mode) {
  gameMode = mode;
  document.getElementById('day-select-title').textContent = 
    mode==='quiz' ? '🎯 퀴즈 - DAY 선택' : '⌨️ 타이핑 - DAY 선택';
  renderDayGrid();
  renderStatsSummary();
  showScreen('day');
}

function renderDayGrid() {
  const grid = document.getElementById('day-grid');
  grid.innerHTML = '';
  const days = Object.keys(ALL_DAYS).sort((a,b)=>parseInt(a)-parseInt(b));
  
  days.forEach(d => {
    const info = ALL_DAYS[d];
    const ranks = JSON.parse(localStorage.getItem(`ranking_${gameMode}_day${d}`)||'[]');
    const cleared = ranks.length > 0;
    const bestScore = cleared ? Math.max(...ranks.map(r=>r.score)) : 0;
    
    const card = document.createElement('button');
    card.className = 'day-card' + (cleared?' cleared':'');
    card.onclick = ()=>selectDay(d);
    card.innerHTML = `
      <div class="day-num">DAY ${d}</div>
      <div class="day-title">${info.title}</div>
      ${cleared ? `<div class="best-score">최고 ${bestScore}점</div>` : ''}
    `;
    grid.appendChild(card);
  });
}

function renderStatsSummary() {
  const days = Object.keys(ALL_DAYS);
  let cleared = 0;
  let totalBest = 0;
  days.forEach(d => {
    const ranks = JSON.parse(localStorage.getItem(`ranking_${gameMode}_day${d}`)||'[]');
    if(ranks.length > 0) {
      cleared++;
      totalBest += Math.max(...ranks.map(r=>r.score));
    }
  });
  document.getElementById('stats-summary').innerHTML = `
    <div><div class="big">${cleared}/${days.length}</div><div>클리어 DAY</div></div>
    <div><div class="big">${totalBest}</div><div>총 최고점</div></div>
  `;
}

function selectDay(d) {
  selectedDay = d;
  const info = ALL_DAYS[d];
  document.getElementById('mode-day-num').textContent = `DAY ${d}`;
  document.getElementById('mode-day-title').textContent = info.title;
  showScreen('mode');
}

function setDirection(dir) {
  direction = dir;
  const words = ALL_DAYS[selectedDay].words.map(w=>({en: w[0], ko: w[1], ipa: w[2]}));
  questions = shuffle([...words]).map(w=>{
    let qDir = dir;
    if(dir==='mixed') qDir = Math.random()<0.5?'en2ko':'ko2en';
    return {...w, dir: qDir};
  });
  currentIdx = 0; score = 0; combo = 0; maxCombo = 0; correctCount = 0;
  
  if(gameMode==='quiz') {
    document.getElementById('quiz-day-num').textContent = selectedDay;
    showScreen('quiz'); 
    nextQuiz();
  } else {
    document.getElementById('typing-day-num').textContent = selectedDay;
    showScreen('typing'); 
    nextTyping();
  }
}

function shuffle(arr) {
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

// ============ 퀴즈 (4지선다) ============
function nextQuiz() {
  if(currentIdx >= questions.length) { endGame(); return; }
  answered = false;
  const q = questions[currentIdx];
  
  document.getElementById('quiz-progress').textContent = `${currentIdx+1}/${questions.length}`;
  document.getElementById('quiz-score').textContent = score;
  document.getElementById('quiz-combo').textContent = combo;
  document.getElementById('quiz-progress-fill').style.width = ((currentIdx)/questions.length*100)+'%';
  document.getElementById('quiz-feedback').innerHTML = '';
  
  const wordEl = document.getElementById('quiz-word');
  const labelEl = document.getElementById('quiz-label');
  
  let questionText, correctAnswer;
  const pronEl = document.getElementById('quiz-pron');
  if(q.dir==='en2ko') {
    questionText = q.en;
    correctAnswer = q.ko;
    labelEl.textContent = '이 단어의 뜻은?';
    wordEl.classList.remove('korean');
    pronEl.textContent = q.ipa || '';
    pronEl.style.display = q.ipa ? 'block' : 'none';
  } else {
    questionText = q.ko;
    correctAnswer = q.en;
    labelEl.textContent = '영어 단어는?';
    wordEl.classList.add('korean');
    pronEl.style.display = 'none'; // 한→영일 때는 발음기호 숨김 (힌트가 되니까)
  }
  wordEl.textContent = questionText;
  
  // 같은 DAY 안에서만 오답 보기
  const dayWords = ALL_DAYS[selectedDay].words.map(w=>({en: w[0], ko: w[1]}));
  const others = dayWords.filter(w=>w.en!==q.en);
  const wrongs = shuffle(others).slice(0,3).map(w=>q.dir==='en2ko'?w.ko:w.en);
  const choices = shuffle([correctAnswer, ...wrongs]);
  
  const choicesEl = document.getElementById('quiz-choices');
  choicesEl.innerHTML = '';
  choices.forEach((ch,i)=>{
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.innerHTML = `<span class="num">${i+1}</span><span>${ch}</span>`;
    btn.onclick = ()=>checkQuiz(btn, ch===correctAnswer, correctAnswer);
    choicesEl.appendChild(btn);
  });
}

function checkQuiz(btn, isCorrect, correctAnswer) {
  if(answered) return;
  answered = true;
  
  const q = questions[currentIdx];
  const allBtns = document.querySelectorAll('#quiz-choices .choice');
  
  if(isCorrect) {
    btn.classList.add('correct');
    combo++;
    if(combo>maxCombo) maxCombo = combo;
    correctCount++;
    const points = 10 + Math.min(combo-1, 10)*2;
    score += points;
    sndCorrect();
    
    const rect = btn.getBoundingClientRect();
    spawnParticles(rect.left+rect.width/2, rect.top+rect.height/2);
    
    if(combo>=3 && combo%3===0) {
      showCombo(`${combo} COMBO!`);
      sndCombo();
    }
    
    document.getElementById('quiz-feedback').innerHTML = `<span style="color:#fde047;">+${points}점! 🎉</span>`;
  } else {
    btn.classList.add('wrong');
    combo = 0;
    sndWrong();
    allBtns.forEach(b=>{
      if(b.textContent.includes(correctAnswer)) b.classList.add('correct');
    });
    // 정답이 영단어인 경우 발음기호도 표시
    let answerDisplay = correctAnswer;
    if(q.dir==='ko2en' && q.ipa) {
      answerDisplay = `${correctAnswer}<span class="pron">/ ${q.ipa} /</span>`;
    }
    document.getElementById('quiz-feedback').innerHTML = 
      `<span style="color:#fff;">아쉬워요! 정답:</span><div class="correct-answer">${answerDisplay}</div>`;
  }
  
  document.getElementById('quiz-score').textContent = score;
  document.getElementById('quiz-combo').textContent = combo;
  
  allBtns.forEach(b=>b.style.pointerEvents='none');
  
  const nextBtn = document.createElement('button');
  nextBtn.className = 'next-btn';
  nextBtn.textContent = currentIdx+1 >= questions.length ? '🏆 결과 보기' : '다음 문제 →';
  nextBtn.onclick = ()=>{ currentIdx++; nextQuiz(); };
  document.getElementById('quiz-feedback').appendChild(nextBtn);
}

function nextTyping() {
  if(currentIdx >= questions.length) { endGame(); return; }
  answered = false;
  hintUsed = false;
  retryUsed = false;
  const q = questions[currentIdx];
  
  document.getElementById('typing-progress').textContent = `${currentIdx+1}/${questions.length}`;
  document.getElementById('typing-score').textContent = score;
  document.getElementById('typing-combo').textContent = combo;
  document.getElementById('typing-progress-fill').style.width = ((currentIdx)/questions.length*100)+'%';
  document.getElementById('typing-feedback').innerHTML = '';
  document.getElementById('typing-hint').textContent = '';
  
  const wordEl = document.getElementById('typing-word');
  const labelEl = document.getElementById('typing-label');
  const input = document.getElementById('typing-input');
  
  const tPronEl = document.getElementById('typing-pron');
  if(q.dir==='en2ko') {
    wordEl.textContent = q.en;
    wordEl.classList.remove('korean');
    labelEl.textContent = '한글 뜻을 입력!';
    input.placeholder = '한글로 입력 (예: 인사하다)';
    tPronEl.textContent = q.ipa || '';
    tPronEl.style.display = q.ipa ? 'block' : 'none';
  } else {
    wordEl.textContent = q.ko;
    wordEl.classList.add('korean');
    labelEl.textContent = '영어 단어 입력!';
    input.placeholder = '영어로 입력...';
    tPronEl.style.display = 'none';
  }
  input.value = '';
  input.classList.remove('correct','wrong');
  input.disabled = false;
  setTimeout(()=>input.focus(), 100);
}

function checkTyping() {
  if(answered) return;
  const q = questions[currentIdx];
  const input = document.getElementById('typing-input');
  const userAns = input.value.trim().toLowerCase();
  if(!userAns) return;
  
  const correctAns = q.dir==='en2ko' ? q.ko : q.en;
  
  let isCorrect = false;
  if(q.dir==='en2ko') {
    const correctWords = correctAns.replace(/[\s,]+/g, '|').split('|').filter(x=>x);
    isCorrect = correctWords.some(cw => userAns.includes(cw.toLowerCase().trim()));
    if(!isCorrect) isCorrect = correctAns.toLowerCase().includes(userAns);
  } else {
    isCorrect = userAns === correctAns.toLowerCase();
  }
  
  if(isCorrect) {
    answered = true;
    input.disabled = true;
    input.classList.add('correct');
    combo++;
    if(combo>maxCombo) maxCombo = combo;
    correctCount++;
    let points = (hintUsed || retryUsed) ? 7 : 15;
    points += Math.min(combo-1, 10)*2;
    score += points;
    sndCorrect();
    
    const rect = input.getBoundingClientRect();
    spawnParticles(rect.left+rect.width/2, rect.top+rect.height/2);
    
    if(combo>=3 && combo%3===0) {
      showCombo(`${combo} COMBO!`);
      sndCombo();
    }
    
    let msg = `정답! +${points}점 🎉`;
    if(retryUsed) msg = `잘했어요! +${points}점 💪 (재도전 성공)`;
    document.getElementById('typing-feedback').innerHTML = `<span style="color:#fde047;">${msg}</span>`;
    
    document.getElementById('typing-score').textContent = score;
    document.getElementById('typing-combo').textContent = combo;
    
    const nextBtn = document.createElement('button');
    nextBtn.className = 'next-btn';
    nextBtn.textContent = currentIdx+1 >= questions.length ? '🏆 결과 보기' : '다음 문제 →';
    nextBtn.onclick = ()=>{ currentIdx++; nextTyping(); };
    document.getElementById('typing-feedback').appendChild(nextBtn);
  } else {
    if(!retryUsed) {
      retryUsed = true;
      input.classList.add('wrong');
      sndWrong();
      
      setTimeout(()=>{
        input.classList.remove('wrong');
        input.value = '';
        input.focus();
      }, 700);
      
      document.getElementById('typing-feedback').innerHTML = 
        `<span style="color:#fde047; font-size:1.15rem;">❤️ 한 번 더! 다시 도전해봐요!</span>`;
    } else {
      answered = true;
      input.disabled = true;
      input.classList.add('wrong');
      combo = 0;
      sndWrong();
      let ansDisp = correctAns;
      if(q.dir==='ko2en' && q.ipa) {
        ansDisp = `${correctAns}<span class="pron">/ ${q.ipa} /</span>`;
      }
      document.getElementById('typing-feedback').innerHTML = 
        `<span style="color:#fff;">아쉬워요! 정답:</span><div class="correct-answer">${ansDisp}</div>`;
      
      document.getElementById('typing-combo').textContent = combo;
      
      const nextBtn = document.createElement('button');
      nextBtn.className = 'next-btn';
      nextBtn.textContent = currentIdx+1 >= questions.length ? '🏆 결과 보기' : '다음 문제 →';
      nextBtn.onclick = ()=>{ currentIdx++; nextTyping(); };
      document.getElementById('typing-feedback').appendChild(nextBtn);
    }
  }
}

function showHint() {
  if(answered) return;
  const q = questions[currentIdx];
  const ans = q.dir==='en2ko' ? q.ko : q.en;
  let hint = '';
  for(let ch of ans) {
    if(ch===' '||ch===','||ch==='~') hint += ch;
    else hint += (Math.random()<0.4 ? ch : '_');
  }
  if(ans.length>0) hint = ans[0] + hint.substring(1);
  document.getElementById('typing-hint').textContent = hint;
  hintUsed = true;
  sndClick();
}

function skipQuestion() {
  if(answered) return;
  answered = true;
  combo = 0;
  const q = questions[currentIdx];
  const correctAns = q.dir==='en2ko' ? q.ko : q.en;
  document.getElementById('typing-input').disabled = true;
  document.getElementById('typing-combo').textContent = combo;
  sndWrong();
  let ansDisp = correctAns;
  if(q.dir==='ko2en' && q.ipa) {
    ansDisp = `${correctAns}<span class="pron">/ ${q.ipa} /</span>`;
  }
  document.getElementById('typing-feedback').innerHTML = 
    `<span style="color:#fff;">패스! 정답:</span><div class="correct-answer">${ansDisp}</div>`;
  
  const nextBtn = document.createElement('button');
  nextBtn.className = 'next-btn';
  nextBtn.textContent = currentIdx+1 >= questions.length ? '🏆 결과 보기' : '다음 문제 →';
  nextBtn.onclick = ()=>{ currentIdx++; nextTyping(); };
  document.getElementById('typing-feedback').appendChild(nextBtn);
}

document.getElementById('typing-input').addEventListener('keydown', (e)=>{
  if(e.key==='Enter') { e.preventDefault(); checkTyping(); }
});

// ============ 결과 ============
function endGame() {
  sndFinish();
  const total = questions.length;
  const percent = (correctCount/total*100).toFixed(0);
  
  let trophy='🎉', title='수고했어요!', msg='';
  if(percent>=90) { trophy='🏆'; title='완벽해요!'; msg='최고의 영단어 마스터! 👑'; }
  else if(percent>=70) { trophy='🥇'; title='훌륭해요!'; msg='조금만 더 하면 마스터!'; }
  else if(percent>=50) { trophy='🥈'; title='잘했어요!'; msg='꾸준히 하면 더 잘할 수 있어요!'; }
  else { trophy='🥉'; title='도전 완료!'; msg='다시 한번 도전해봐요!'; }
  
  document.getElementById('result-trophy').textContent = trophy;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-day-info').textContent = `DAY ${selectedDay} - ${ALL_DAYS[selectedDay].title}`;
  document.getElementById('result-message').textContent = msg + ` (${correctCount}/${total} 정답, ${percent}%)`;
  document.getElementById('result-score').textContent = score;
  document.getElementById('result-correct').textContent = `${correctCount}/${total}`;
  document.getElementById('result-combo').textContent = maxCombo;
  document.getElementById('player-name').value = localStorage.getItem('lastPlayerName')||'';
  
  showScreen('result');
}

// ============ 점수 저장 ============
function saveScore() {
  const name = document.getElementById('player-name').value.trim() || '익명';
  localStorage.setItem('lastPlayerName', name);
  
  const key = `ranking_${gameMode}_day${selectedDay}`;
  const ranks = JSON.parse(localStorage.getItem(key)||'[]');
  ranks.push({
    name, score, correct: correctCount, total: questions.length,
    combo: maxCombo, date: new Date().toISOString().split('T')[0]
  });
  ranks.sort((a,b)=>b.score-a.score);
  ranks.splice(10);
  localStorage.setItem(key, JSON.stringify(ranks));
  
  sndCorrect();
  spawnParticles(window.innerWidth/2, window.innerHeight/2, ['🏆','⭐','💖','🎉']);
  alert('🎉 저장 완료! 랭킹에서 확인하세요!');
  showRanking();
}

// ============ 랭킹 ============
let currentRankTab = 'quiz';
function showRanking() {
  currentRankTab = 'quiz';
  document.querySelectorAll('.rank-tab button').forEach((b,i)=>{
    b.classList.toggle('active', i===0);
  });
  
  // DAY 선택 드롭다운 채우기
  const select = document.getElementById('rank-day-select');
  select.innerHTML = '';
  Object.keys(ALL_DAYS).sort((a,b)=>parseInt(a)-parseInt(b)).forEach(d => {
    const opt = document.createElement('option');
    opt.value = d;
    opt.textContent = `DAY ${d} - ${ALL_DAYS[d].title}`;
    select.appendChild(opt);
  });
  // 마지막에 플레이한 DAY 선택
  if(selectedDay) select.value = selectedDay;
  
  renderRanking();
  showScreen('ranking');
}

function switchRankTab(btn, mode) {
  document.querySelectorAll('.rank-tab button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentRankTab = mode;
  renderRanking();
  sndClick();
}

function renderRanking() {
  const day = document.getElementById('rank-day-select').value;
  const key = `ranking_${currentRankTab}_day${day}`;
  const ranks = JSON.parse(localStorage.getItem(key)||'[]');
  const list = document.getElementById('rank-list');
  
  if(ranks.length===0) {
    list.innerHTML = '<div class="rank-empty">아직 기록이 없어요!<br>첫 번째 도전자가 되어보세요 🚀</div>';
    return;
  }
  
  list.innerHTML = ranks.map((r,i)=>{
    let medal = '🏅';
    if(i===0) medal='🥇'; else if(i===1) medal='🥈'; else if(i===2) medal='🥉';
    else medal = `<span style="font-size:1rem;color:#888;">${i+1}</span>`;
    return `<div class="rank-item">
      <div class="rank-medal">${medal}</div>
      <div class="rank-name">${escapeHtml(r.name)}<div style="font-size:0.7rem;color:#888;font-weight:normal;">${r.correct}/${r.total} · 콤보${r.combo} · ${r.date}</div></div>
      <div class="rank-score">${r.score}점</div>
    </div>`;
  }).join('');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

document.addEventListener('click', ()=>{
  getCtx();
  // iOS Safari가 아닌 경우만 fullscreen API 사용 (iOS는 PWA 방식 권장)
  if(!/iPad|iPhone|iPod/.test(navigator.userAgent)) {
    tryFullscreen();
  }
}, {once:true});

// PWA로 실행 안된 경우 iOS 사용자에게 홈 화면 추가 안내 (1회)
if(/iPhone|iPod/.test(navigator.userAgent) && !window.navigator.standalone && !sessionStorage.getItem('pwa_hint')) {
  sessionStorage.setItem('pwa_hint', '1');
  setTimeout(()=>{
    const hint = document.createElement('div');
    hint.style.cssText = 'position:fixed;bottom:20px;left:10px;right:10px;background:rgba(0,0,0,0.85);color:white;padding:14px;border-radius:16px;font-size:0.9rem;z-index:1000;text-align:center;line-height:1.5;backdrop-filter:blur(10px);';
    hint.innerHTML = '💡 <b>전체화면으로 즐기기</b><br>사파리 하단 <b>공유 ⬆️</b> → <b>홈 화면에 추가</b>를 누른 뒤,<br>홈 화면에서 아이콘으로 실행해주세요!<br><button onclick="this.parentElement.remove()" style="margin-top:10px;padding:6px 18px;background:#fde047;color:#333;border:none;border-radius:10px;font-weight:bold;font-family:inherit;">알겠어요!</button>';
    document.body.appendChild(hint);
  }, 1500);
}
